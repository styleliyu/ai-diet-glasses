spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/diet_system?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8}
spring.datasource.username=${DB_USERNAME:diet_admin}
spring.datasource.password=${DB_PASSWORD:change_me}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${SERVER_PORT:8080}

aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
aliyun.oss.accessKeyId=${ALIYUN_OSS_ACCESS_KEY_ID:change_me}
aliyun.oss.accessKeySecret=${ALIYUN_OSS_ACCESS_KEY_SECRET:change_me}
aliyun.oss.bucketName=${ALIYUN_OSS_BUCKET_NAME:diet-glasses-oss}

spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:change_me}
spring.mail.password=${MAIL_PASSWORD:change_me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

qwen.api.key=${QWEN_API_KEY:change_me}
